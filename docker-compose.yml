services:
  hermes:
    # Use the published Hermes image to keep this stack portable.
    # If you need a custom Hermes build, switch this service back to `build:`
    # with a repo-relative context path.
    image: nousresearch/hermes-agent:latest
    # Hermes image may be amd64-only; allow override if/when arm64 is available.
    platform: ${HERMES_PLATFORM:-linux/amd64}
    container_name: hermes
    restart: unless-stopped
    command: gateway run
    volumes:
      - ~/.hermes:/opt/data
    environment:
      - TZ=UTC
    shm_size: 1g
    deploy:
      resources:
        limits:
          memory: 4G
          cpus: "2.0"
  postgres:
    image: postgres:15-alpine
    container_name: hermes_postgres
    restart: unless-stopped
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=hermes_dashboard
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DATABASE_PORT:-5433}:5432"

  dashboard-api:
    build: ./apps/dashboard-api
    container_name: dashboard_api
    restart: unless-stopped
    volumes:
      - ./apps/dashboard-api:/app
      - /app/node_modules
    command: sh -c "npm ci --omit=dev && npm start"
    environment:
      - PORT=${DASHBOARD_API_PORT:-4000}
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/hermes_dashboard}
      - HERMES_BASE_URL=${HERMES_BASE_URL:-http://hermes:8642}
      # Hermes responses can exceed 60s for heavier work; allow a bigger default in local dev.
      - HERMES_TIMEOUT_MS=${HERMES_TIMEOUT_MS:-120000}
      # Jobs may legitimately take longer than interactive calls (browser tools, etc.)
      - HERMES_JOB_TIMEOUT_MS=${HERMES_JOB_TIMEOUT_MS:-600000}
      - ADMIN_API_KEY=${ADMIN_API_KEY:-devkey}
      # Optional: used for UI cost estimation in /api/v1/overview and message jobs.
      - COST_PER_1K_TOKENS_USD=${COST_PER_1K_TOKENS_USD:-0}
      # Optional split pricing (preferred if provider bills input/output differently).
      - COST_INPUT_PER_1M_TOKENS_USD=${COST_INPUT_PER_1M_TOKENS_USD:-0}
      - COST_OUTPUT_PER_1M_TOKENS_USD=${COST_OUTPUT_PER_1M_TOKENS_USD:-0}
      - PRISMA_DB_PUSH_ON_START=1
      - NODE_ENV=development
    ports:
      - "${DASHBOARD_API_PORT:-4000}:4000"
    depends_on:
      - hermes
      - postgres

  dashboard-web:
    build: ./apps/dashboard-web
    container_name: dashboard_web
    restart: unless-stopped
    volumes:
      - ./apps/dashboard-web:/app
      - /app/node_modules
      # Keep Next.js build output inside the container to avoid stale/partial `.next`
      # artifacts on the host causing missing `vendor-chunks/*` at runtime.
      - /app/.next
    command: sh -c "npm ci && npm run dev"
    environment:
      - PORT=${DASHBOARD_WEB_PORT:-3000}
      - DASHBOARD_API_URL=${DASHBOARD_API_URL:-http://dashboard-api:4000}
      - NEXT_TELEMETRY_DISABLED=1
      # Improves file watching reliability on Docker Desktop (macOS/Windows)
      - CHOKIDAR_USEPOLLING=1
    ports:
      - "${DASHBOARD_WEB_PORT:-3000}:3000"
    depends_on:
      - dashboard-api

volumes:
  postgres_data:
